# YYC³ Family-AI Docker Compose 配置
# 用于企业私有部署

version: '3.8'

services:
  # ==========================================
  # YYC³ Family-AI 主服务
  # ==========================================
  yyc3-family-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: yyc3-family-ai:latest
    container_name: yyc3-family-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3200}:80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - yyc3-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.yyccube.service=yyc3-family-ai"
      - "com.yyccube.version=1.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

