name: 📊 Test Coverage Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run tests with coverage
        run: pnpm test:coverage
        env:
          CI: true

      - name: 📊 Generate coverage report
        run: |
          pnpm exec vitest run --coverage --reporter=json --coverage.reporter=json-summary
          
      - name: 📈 Create coverage badge
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;
            const percentage = total.lines.pct;
            
            let color = 'red';
            if (percentage >= 90) color = 'brightgreen';
            else if (percentage >= 80) color = 'green';
            else if (percentage >= 70) color = 'yellow';
            else if (percentage >= 60) color = 'orange';
            
            console.log(`Coverage: ${percentage}%`);
            console.log(`Badge color: ${color}`);
            
            // Create badge JSON
            const badge = {
              schemaVersion: 1,
              label: 'coverage',
              message: `${percentage}%`,
              color: color
            };
            
            fs.writeFileSync('coverage/badge.json', JSON.stringify(badge));

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: yyc3-family-ai-coverage
          fail_ci_if_error: false
          verbose: true

      - name: 📝 Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;
            
            const body = `## 📊 Test Coverage Report
            
            | Type | Coverage | Details |
            |------|----------|---------|
            | **Lines** | ${total.lines.pct.toFixed(2)}% | ${total.lines.covered}/${total.lines.total} |
            | **Statements** | ${total.statements.pct.toFixed(2)}% | ${total.statements.covered}/${total.statements.total} |
            | **Branches** | ${total.branches.pct.toFixed(2)}% | ${total.branches.covered}/${total.branches.total} |
            | **Functions** | ${total.functions.pct.toFixed(2)}% | ${total.functions.covered}/${total.functions.total} |
            
            > 📈 [View detailed report on Codecov](https://codecov.io/gh/${{ github.repository }}/commit/${{ github.sha }})
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: 📦 Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/node_modules
          retention-days: 30

      - name: 🚀 Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage/lcov-report
          destination_dir: coverage
