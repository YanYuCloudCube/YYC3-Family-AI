name: YYC3 Family AI - Complete CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests'
        required: false
        default: 'true'
        type: boolean
      run_performance:
        description: 'Run performance tests'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Stage 1: Code Quality ──
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        id: eslint
        run: |
          pnpm lint 2>&1 | tee eslint-output.txt
          echo "eslint_warnings=$(grep -c 'warning' eslint-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "eslint_errors=$(grep -c 'error' eslint-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: Run TypeScript Check
        run: pnpm typecheck

      - name: Check for console.log statements
        run: |
          CONSOLE_COUNT=$(grep -r "console\.\(log\|warn\|error\)" src/ --include="*.ts" --include="*.tsx" | grep -v "node_modules" | wc -l || echo 0)
          echo "console_statements=$CONSOLE_COUNT" >> $GITHUB_OUTPUT
          if [ "$CONSOLE_COUNT" -gt 50 ]; then
            echo "::warning::Found $CONSOLE_COUNT console statements, consider using logging service"
          fi

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: eslint-output.txt
          retention-days: 7

  # ── Stage 2: Unit Tests ──
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test -- --ci --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/
          retention-days: 7

  # ── Stage 3: Integration Tests ──
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm test -- --ci --testPathPattern="integration" --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: integration-junit.xml
        continue-on-error: true

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/
          retention-days: 7

  # ── Stage 4: Performance Tests ──
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event.inputs.run_performance == 'true' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run performance tests
        run: pnpm test -- --ci --testPathPattern="performance" --reporters=default
        continue-on-error: true

      - name: Generate performance report
        run: |
          echo "## Performance Test Results" > performance-report.md
          echo "" >> performance-report.md
          echo "### Memory Usage" >> performance-report.md
          echo "- Peak Memory: Measured during tests" >> performance-report.md
          echo "" >> performance-report.md
          echo "### Render Performance" >> performance-report.md
          echo "- FPS: Target 60fps" >> performance-report.md
          echo "- Frame Time: Target <16.67ms" >> performance-report.md

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.md
          retention-days: 7

  # ── Stage 5: Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Check build size
        run: |
          BUILD_SIZE=$(du -sh dist/ | cut -f1)
          echo "build_size=$BUILD_SIZE" >> $GITHUB_OUTPUT
          echo "Build size: $BUILD_SIZE"

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  # ── Stage 6: Deploy ──
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: https://family-ai.yyccube.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Stage 7: Report ──
  report:
    name: Generate CI Report
    needs: [quality-check, unit-tests, integration-tests, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate comprehensive report
        run: |
          cat << EOF > ci-report.md
          # YYC³ Family AI - CI/CD Pipeline Report
          
          ## Build Information
          - **Branch**: ${{ github.ref_name }}
          - **Commit**: ${{ github.sha }}
          - **Triggered by**: ${{ github.actor }}
          - **Event**: ${{ github.event_name }}
          - **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ## Pipeline Status
          
          | Stage | Status |
          |-------|--------|
          | Code Quality | ${{ needs.quality-check.result }} |
          | Unit Tests | ${{ needs.unit-tests.result }} |
          | Integration Tests | ${{ needs.integration-tests.result }} |
          | Build | ${{ needs.build.result }} |
          
          ## Quality Metrics
          
          ### Code Quality
          - ESLint: Completed
          - TypeScript: Type-safe
          - Console statements: Checked
          
          ### Test Coverage
          - Unit Tests: Executed
          - Integration Tests: Executed
          - Coverage report: Available in artifacts
          
          ## Artifacts
          - coverage-report: Test coverage data
          - test-results: JUnit XML reports
          - quality-report: ESLint output
          
          ## Next Steps
          - Review any warnings or errors
          - Check coverage report for gaps
          - Verify deployment if applicable
          
          ---
          *Generated by YYC³ CI/CD Pipeline*
          EOF

      - name: Upload CI report
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci-report.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ci-report.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 8: Notification ──
  notify:
    name: Send Notifications
    needs: [build, report]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification
        if: success()
        run: |
          echo "✅ CI/CD Pipeline completed successfully"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ CI/CD Pipeline failed"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Please check the workflow logs for details"
