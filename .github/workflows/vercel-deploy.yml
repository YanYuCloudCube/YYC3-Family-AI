name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test -- --ci

      - name: Build project
        run: pnpm build
        env:
          VITE_APP_URL: https://family-ai.yyccube.com

      - name: Install Vercel CLI and Deploy
        run: |
          pnpm setup
          echo "PNPM_HOME=$HOME/.local/share/pnpm" >> $GITHUB_ENV
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          pnpm add -g vercel

          vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment to Vercel successful!"
          echo "🌐 Check your Vercel Dashboard for the deployment URL"
          echo "📅 Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "💡 After first deployment, you can find the Project URL in:"
          echo "   https://vercel.com/dashboard"
          echo ""
          echo "📝 To enable faster future deploys (optional):"
          echo "   1. Go to your project on Vercel dashboard"
          echo "   2. Copy the Org ID and Project ID from Settings"
          echo "   3. Add them as GitHub Secrets:"
          echo "      - VERCEL_ORG_ID"
          echo "      - VERCEL_PROJECT_ID"
