<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Web App/favicon-32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/Web App/favicon-16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/Web App/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Meta description -->
    <meta name="description" content="YYC3 Family AI - 智能编程助手" />
    <meta name="theme-color" content="#0ea5e9" />
    
    <!-- Content Security Policy (CSP) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://api.yyc3.com wss://*.yyc3.com;
      worker-src 'self' blob:;
      frame-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    " />
    
    <!-- Apple specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YYC3 AI" />
    
    <!-- Microsoft specific -->
    <meta name="msapplication-TileColor" content="#0ea5e9" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <title>YYC3 Family AI - 智能编程助手</title>
    
    <!-- Critical CSS inline for faster FCP -->
    <style>
      /* Critical CSS for above-the-fold content */
      *,*::before,*::after{box-sizing:border-box}
      html{line-height:1.15;-webkit-text-size-adjust:100%}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      #root{min-height:100vh;display:flex;flex-direction:column}
      
      /* Loading state */
      .app-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0e1a}
      .app-loading-spinner{width:40px;height:40px;border:3px solid #1e3a5f;border-top-color:#0ea5e9;border-radius:50%;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      
      /* Theme variables */
      :root{--primary:#0ea5e9;--bg-dark:#0a0e1a;--bg-surface:#0f172a;--text-primary:#e2e8f0;--text-secondary:#94a3b8}
    </style>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/assets/codicon-ngg6Pgfi.ttf" as="font" type="font/ttf" crossorigin />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.yyc3.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    
    <!-- DNS prefetch for third-party services -->
    <link rel="dns-prefetch" href="https://api.yyc3.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    
    <!-- CDN 加速配置 - 通过环境变量控制 -->
    <script>
      window.CDN_CONFIG = {
        enabled: false,
        baseUrl: 'https://cdn.jsdelivr.net/npm',
        packages: {
          'react': '18.3.1',
          'react-dom': '18.3.1',
          'zustand': '5.0.2',
        }
      };
    </script>
    
    <!-- CDN 脚本加载器 -->
    <script>
      (function() {
        const config = window.CDN_CONFIG;
        if (!config.enabled) return;
        
        const loadScript = (name, version) => {
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `${config.baseUrl}/${name}@${version}/umd/${name}.development.js`;
            script.crossOrigin = 'anonymous';
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
        };
        
        // 并行加载所有 CDN 包
        const promises = Object.entries(config.packages).map(([name, version]) => 
          loadScript(name, version)
        );
        
        Promise.all(promises).catch(err => {
          console.error('[CDN] Failed to load packages:', err);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading state before React mounts -->
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(registration => {
              console.log('[PWA] Service Worker registered:', registration.scope);
            })
            .catch(error => {
              console.error('[PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
